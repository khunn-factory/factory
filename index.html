const loadFromCache = () => { try { return JSON.parse(localStorage.getItem(CACHE_KEY))||[]; } catch { return []; } };

const elapsedStr = (ms) => {
  const m = Math.floor(ms/60000);
  if (m<60) return `${m}น.`;
  if (m<1440) return `${Math.floor(m/60)}ชม.${m%60}น.`;
  return `${Math.floor(m/1440)}วัน ${Math.floor((m%1440)/60)}ชม.`;
};
const generateId = (type) => {
  const n=new Date(), dd=String(n.getDate()).padStart(2,"0"), mm=String(n.getMonth()+1).padStart(2,"0"), yy=String(n.getFullYear()).slice(-2);
  return `${ORDER_TYPES[type].prefix}-${dd}${mm}${yy}-${Math.random().toString(36).slice(2,5).toUpperCase()}`;
};

// Pair helpers
const getPairsInDept = (order, deptId) => (order.pairs||[]).filter(p=>p.currentDept===deptId);
const getTotalInDept   = (o,d) => getPairsInDept(o,d).reduce((s,p)=>s+(Number(p.qty)||0),0);
const getOrderCurrentDepts = (order) => {
  const depts = [...new Set((order.pairs||[]).filter(p=>p.currentDept!=="done").map(p=>p.currentDept))];
  return depts.sort((a,b)=>DEPT_ORDER.indexOf(a)-DEPT_ORDER.indexOf(b));
};
const orderIsFullyDone = (order) => (order.pairs||[]).every(p=>p.currentDept==="done");
const orderLeadDept = (order) => {
  if (orderIsFullyDone(order)) return "done";
  const depts = getOrderCurrentDepts(order);
  return depts[0] || "done";
};
const isOrderInDept = (order, deptId) => {
  if (deptId==="done") return orderIsFullyDone(order);
  return getPairsInDept(order,deptId).length > 0;
};
const isOverdue = (order) => {
  if (orderIsFullyDone(order)) return false;
  return (order.pairs||[]).some(p=>{
    if (p.currentDept==="done") return false;
    return p.enteredAt && (Date.now()-p.enteredAt) > ALERT_HOURS*3600000;
  });
};
const sortOrders = (list) => [...list].sort((a,b)=>(TYPE_PRIORITY[a.type]??9)-(TYPE_PRIORITY[b.type]??9));

/* ═══════════════ ADVANCE PAIRS LOGIC ═══════════════ */
// advanceSomePairs: orderId, pairId, qtyToAdvance
const advanceSomePairs = (orders, orderId, pairId, qtyToAdvance) => {
  return orders.map(o => {
    if (o.id !== orderId) return o;
    const pair = o.pairs.find(p=>p.id===pairId);
    if (!pair) return o;
    const curIdx  = DEPT_ORDER.indexOf(pair.currentDept);
    const nextDept = curIdx >= DEPT_ORDER.length-1 ? "done" : DEPT_ORDER[curIdx+1];
    const qty      = Math.min(qtyToAdvance, Number(pair.qty)||1);
    let newPairs   = o.pairs.filter(p=>p.id!==pairId);
    if (pair.qty - qty > 0) {
      newPairs.push({ ...pair, qty: pair.qty - qty });
    }
    // merge with existing same-SKU same-dest if any
    const existing = newPairs.find(p=>p.model===pair.model&&p.color===pair.color&&p.size===pair.size&&p.currentDept===nextDept);
    if (existing) {
      newPairs = newPairs.map(p=>p.id===existing.id?{...p,qty:p.qty+qty}:p);
    } else {
      newPairs.push({ id:newPid(), model:pair.model, color:pair.color, size:pair.size, qty, currentDept:nextDept, enteredAt:Date.now(), label:pair.label });
    }
    return { ...o, pairs: newPairs };
  });
};

            <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#444"}}>🔍</span>
            {searchQuery&&<button onClick={()=>{setSearchQuery("");setActiveView("board");}}
              style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:15}}>×</button>}
          </div>
          {/* alert bell */}
          <button onClick={()=>setShowAlerts(true)} style={{
            position:"relative",padding:"5px 9px",borderRadius:7,border:"1px solid",cursor:"pointer",
            borderColor:overdueOrders.length?"#ef4444":"#1e1e2c",
            background:overdueOrders.length?"#ef444414":"#16161c",
            color:overdueOrders.length?"#ef4444":"#555",fontSize:15}}>
            🔔{overdueOrders.length>0&&<span style={{position:"absolute",top:-4,right:-4,width:15,height:15,borderRadius:"50%",
              background:"#ef4444",color:"#fff",fontSize:9,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {overdueOrders.length}</span>}
          </button>
          {/* type filter */}
          <div style={{display:"flex",background:"#18181f",borderRadius:8,padding:2,gap:1}}>
            {[["all","ทั้งหมด","#888"],...Object.entries(ORDER_TYPES).map(([k,t])=>[k,`${t.icon}${k}`,t.color])].map(([v,label,color])=>(
              <button key={v} onClick={()=>setFilterType(v)} style={{
                padding:"3px 9px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
                background:filterType===v?color:"transparent",color:filterType===v?(v==="all"?"#111":"#fff"):"#555"}}>
                {label}
              </button>
            ))}
          </div>
          {[["board","📋บอร์ด"],["list","📃รายการ"],["staff","👷ช่าง"]].map(([v,label])=>(
            <button key={v} onClick={()=>{setActiveView(v);setSearchQuery("");}}
              style={{padding:"5px 10px",borderRadius:7,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,
                background:activeView===v&&!searchQuery?"#f59e0b":"#1a1a22",
                color:activeView===v&&!searchQuery?"#000":"#777"}}>
              {label}
            </button>
          ))}
          <button onClick={()=>setShowNewOrder(true)} style={{
            padding:"5px 12px",borderRadius:7,border:"none",cursor:"pointer",
            fontSize:12,fontWeight:800,background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff"}}>
            + สร้าง
          </button>
        </div>
      </div>

      {/* ── SEARCH ── */}
      {activeView==="search"&&searchQuery&&(
        <div style={{padding:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <div style={{width:4,height:20,borderRadius:2,background:"#3b82f6"}}/>
            <h2 style={{margin:0,fontSize:16,fontWeight:800}}>ผลการค้นหา</h2>
            <span style={{background:"#3b82f620",color:"#3b82f6",borderRadius:99,padding:"2px 8px",fontSize:11,fontWeight:700}}>
              "{searchQuery}" · {searchResults.length} รายการ
            </span>
          </div>
          {searchResults.length===0
            ?<div style={{textAlign:"center",padding:50,color:"#2a2a38"}}><div style={{fontSize:32}}>🔍</div>ไม่พบข้อมูล</div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
              {searchResults.map(o=><SearchCard key={o.id} order={o} onSelect={()=>setSelectedOrder(o)}/>)}
            </div>
          }
        </div>
      )}

      {/* ── BOARD ── */}
      {activeView==="board"&&(
        <div style={{padding:16}}>
          {/* dept tabs */}
          <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
            {DEPARTMENTS.map(dept=>{
              const list = getDeptOrderList(dept.id);
              const totalPairs = list.reduce((s,o)=>s+getTotalInDept(o,dept.id),0);
              const over = list.some(o=>getPairsInDept(o,dept.id).some(p=>p.enteredAt&&(Date.now()-p.enteredAt)>ALERT_HOURS*3600000));
              return (
                <button key={dept.id} onClick={()=>setActiveDept(dept.id)} style={{
                  flex:"0 0 auto",padding:"8px 12px",borderRadius:10,textAlign:"left",
                  border:`2px solid ${activeDept===dept.id?dept.color:over?"#ef444444":"#1e1e2c"}`,
                  background:activeDept===dept.id?dept.color+"16":"#16161c",cursor:"pointer",minWidth:100,position:"relative"}}>
                  {over&&<span style={{position:"absolute",top:5,right:5,fontSize:12}}>⚠️</span>}
                  <div style={{fontSize:15}}>{dept.icon}</div>
                  <div style={{fontSize:11,fontWeight:700,color:activeDept===dept.id?dept.color:"#bbb",marginTop:1}}>{dept.short}</div>
                  {dept.staff.length>0&&<div style={{fontSize:9,color:"#444",marginTop:1}}>{dept.staff.join("·")}</div>}
                  <div style={{display:"flex",gap:3,marginTop:4,flexWrap:"wrap"}}>
                    {["F1","L1","L2"].map(k=>{
                      const cnt=list.filter(o=>o.type===k).length;
                      return cnt>0&&<span key={k} style={{fontSize:9,fontWeight:800,color:ORDER_TYPES[k].color,background:ORDER_TYPES[k].color+"1e",padding:"1px 4px",borderRadius:99}}>{ORDER_TYPES[k].icon}{cnt}</span>
                    })}
                    {list.length===0&&<span style={{fontSize:9,color:"#2a2a38"}}>ว่าง</span>}
                    {totalPairs>0&&<span style={{fontSize:9,color:"#555"}}>{totalPairs}คู่</span>}
                  </div>
                </button>
              );
            })}
            <button onClick={()=>setActiveDept("done")} style={{
              flex:"0 0 auto",padding:"8px 12px",borderRadius:10,textAlign:"left",minWidth:90,
              border:`2px solid ${activeDept==="done"?"#22c55e":"#1e1e2c"}`,
              background:activeDept==="done"?"#22c55e16":"#16161c",cursor:"pointer"}}>
              <div style={{fontSize:15}}>✅</div>
              <div style={{fontSize:11,fontWeight:700,color:activeDept==="done"?"#22c55e":"#bbb",marginTop:1}}>เสร็จ</div>
              <div style={{fontSize:9,color:"#555",marginTop:4}}>{doneOrders.length}ล็อต</div>
            </button>
          </div>

          {/* dept content */}
          {activeDept!=="done"&&(()=>{
            const dept = DEPARTMENTS.find(d=>d.id===activeDept);
            const list = getDeptOrderList(activeDept);
            return (
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:4,height:20,borderRadius:2,background:dept.color}}/>
                  <h2 style={{margin:0,fontSize:16,fontWeight:800}}>{dept.name}</h2>
                  {dept.staff.length>0&&<span style={{background:"#1e1e2c",color:"#888",borderRadius:99,padding:"2px 8px",fontSize:11}}>👷 {dept.staff.join(" · ")}</span>}
                  <span style={{background:dept.color+"20",color:dept.color,borderRadius:99,padding:"2px 8px",fontSize:11,fontWeight:700}}>
                    {list.length}ล็อต · {list.reduce((s,o)=>s+getTotalInDept(o,activeDept),0)}คู่
                  </span>
                </div>
                {list.length===0
                  ?<div style={{textAlign:"center",padding:50,color:"#2a2a38"}}><div style={{fontSize:32}}>📭</div>ไม่มีงาน</div>
                  :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
                    {list.map(o=>(
                      <OrderCard key={o.id} order={o} deptId={activeDept}
                        onSelect={()=>setSelectedOrder(o)}
                        onAdvanceAll={()=>advanceAllInDept(o.id,activeDept)}
                        onFinishDirect={activeDept==="finish"||activeDept==="deliver"?()=>finishOrderDirect(o.id):null}/>
                    ))}
                  </div>
                }
              </div>
            );
          })()}
          {activeDept==="done"&&(
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:4,height:20,borderRadius:2,background:"#22c55e"}}/>
                <h2 style={{margin:0,fontSize:16,fontWeight:800}}>เสร็จสิ้น</h2>
              </div>
              {doneOrders.length===0
                ?<div style={{textAlign:"center",padding:50,color:"#2a2a38"}}><div style={{fontSize:32}}>📭</div>ยังไม่มี</div>
                :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
                  {doneOrders.map(o=><OrderCard key={o.id} order={o} deptId="done" onSelect={()=>setSelectedOrder(o)} isDone/>)}
                </div>
              }
            </div>
          )}
        </div>
      )}

      {/* ── LIST ── */}
      {activeView==="list"&&(
        <div style={{padding:16}}>
          <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:11,color:"#444"}}>แผนก:</span>
            {[{id:"all",label:"ทั้งหมด",color:"#888"},...DEPARTMENTS.map(d=>({id:d.id,label:`${d.icon}${d.short}`,color:d.color})),{id:"done",label:"✅เสร็จ",color:"#22c55e"}].map(d=>(
              <button key={d.id} onClick={()=>setFilterDept(d.id)} style={{
                padding:"3px 8px",borderRadius:16,border:"1px solid",cursor:"pointer",fontSize:11,fontWeight:600,
                borderColor:filterDept===d.id?d.color:"#1e1e2c",
                background:filterDept===d.id?d.color+"20":"transparent",
                color:filterDept===d.id?d.color:"#555"}}>
                {d.label}
              </button>
            ))}
          </div>
          <div style={{background:"#16161c",borderRadius:10,overflow:"hidden",border:"1px solid #1e1e2c"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:"#1a1a22",borderBottom:"1px solid #1e1e2c"}}>
                  {["ประเภท","รหัส","SKU","ตำแหน่งปัจจุบัน","คู่รวม","สร้าง",""].map((h,i)=>(
                    <th key={i} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,color:"#444",fontSize:10,textTransform:"uppercase"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sortOrders(orders
                  .filter(o=>filterDept==="all"?true:filterDept==="done"?orderIsFullyDone(o):isOrderInDept(o,filterDept))
                  .filter(o=>filterType==="all"?true:o.type===filterType)
                ).map((o,i)=>{
                  const t=ORDER_TYPES[o.type];
                  const curDepts=getOrderCurrentDepts(o);
                  return (
                    <tr key={o.id} onClick={()=>setSelectedOrder(o)}
                      style={{borderBottom:"1px solid #16161e",cursor:"pointer",background:i%2?"#13131a":"transparent"}}
                      onMouseEnter={e=>e.currentTarget.style.background="#1e1e28"}
                      onMouseLeave={e=>e.currentTarget.style.background=i%2?"#13131a":"transparent"}>
                      <td style={{padding:"8px 10px"}}><span style={{background:t.bg,color:t.color,padding:"2px 7px",borderRadius:99,fontSize:11,fontWeight:800}}>{t.icon}{o.type}</span></td>
                      <td style={{padding:"8px 10px",fontFamily:"monospace",fontWeight:800,color:t.color,fontSize:12}}>{o.id}</td>
                      <td style={{padding:"8px 10px",color:"#888",fontSize:11,maxWidth:200}}>{o.note||"—"}</td>
                      <td style={{padding:"8px 10px"}}>
                        {orderIsFullyDone(o)
                          ?<span style={{color:"#22c55e",fontSize:11,fontWeight:700}}>✅เสร็จ</span>
                          :<div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                            {curDepts.map(dId=>{
                              const dept2=DEPARTMENTS.find(d=>d.id===dId);
                              const cnt=getTotalInDept(o,dId);
                              return <span key={dId} style={{background:dept2.color+"20",color:dept2.color,padding:"1px 6px",borderRadius:99,fontSize:10,fontWeight:700}}>{dept2.icon}{cnt}คู่</span>
                            })}
                          </div>
                        }
                      </td>
                      <td style={{padding:"8px 10px",fontWeight:800}}>{o.totalPairs}</td>
                      <td style={{padding:"8px 10px",color:"#444",fontSize:11}}>{formatDate(o.createdAt)}</td>
                      <td style={{padding:"8px 10px"}}>
                        <button onClick={e=>{e.stopPropagation();setSelectedOrder(o);}} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #1e1e2c",cursor:"pointer",fontSize:11,background:"transparent",color:"#888"}}>รายละเอียด</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── STAFF VIEW ── */}
      {activeView==="staff"&&<StaffView orders={orders} tick={tick} onSelectOrder={setSelectedOrder}/>}

      {/* ── ALERT MODAL ── */}
      {showAlerts&&(
        <Modal onClose={()=>setShowAlerts(false)} title="🔔 การแจ้งเตือน">
          {overdueOrders.length===0
            ?<div style={{textAlign:"center",padding:40,color:"#22c55e"}}><div style={{fontSize:36}}>✅</div><div style={{fontWeight:700}}>ทุกล็อตอยู่ในกำหนด</div></div>
            :overdueOrders.map(o=>{
              const t=ORDER_TYPES[o.type];
              const overduePairs=(o.pairs||[]).filter(p=>p.currentDept!=="done"&&p.enteredAt&&(Date.now()-p.enteredAt)>ALERT_HOURS*3600000);
              return (
                <div key={o.id} onClick={()=>{setSelectedOrder(o);setShowAlerts(false);}}
                  style={{background:"#1a1a22",border:"1px solid #ef444433",borderRadius:10,padding:"12px 14px",marginBottom:10,cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div><span style={{background:t.bg,color:t.color,fontSize:10,fontWeight:800,padding:"1px 7px",borderRadius:99}}>{t.icon}{o.type}</span>
                      <span style={{fontFamily:"monospace",fontWeight:800,color:t.color,fontSize:13,marginLeft:8}}>{o.id}</span></div>
                    <span style={{fontSize:11,color:"#ef4444",fontWeight:700}}>⚠️{overduePairs.length}คู่เกินกำหนด</span>
                  </div>
                  <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:4}}>
                    {overduePairs.slice(0,8).map(p=>{
                      const dept2=DEPARTMENTS.find(d=>d.id===p.currentDept);
                      return <span key={p.id} style={{background:"#ef444415",color:"#ef4444",borderRadius:6,padding:"2px 6px",fontSize:10}}>
                        {p.model}{p.color}{p.size}×{p.qty} @ {dept2?.short}
                      </span>
                    })}
                  </div>
                </div>
              );
            })
          }
        </Modal>
      )}

      {/* ── NEW ORDER MODAL ── */}
      {showNewOrder&&(
        <Modal onClose={()=>setShowNewOrder(false)} title="➕ สร้างใบงานใหม่">
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:"#666",fontWeight:700,marginBottom:7}}>ประเภทใบงาน</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
              {Object.entries(ORDER_TYPES).map(([key,t])=>(
                <button key={key} onClick={()=>setForm(f=>({...f,type:key}))} style={{
                  padding:"10px 8px",borderRadius:9,border:"2px solid",textAlign:"center",cursor:"pointer",
                  borderColor:form.type===key?t.color:"#1e1e2c",background:form.type===key?t.bg:"#111116"}}>
                  <div style={{fontSize:20}}>{t.icon}</div>
                  <div style={{fontWeight:800,fontSize:12,color:form.type===key?t.color:"#aaa"}}>{key}</div>
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <label style={labelStyle}><span>รุ่น</span>
              <select value={form.model} onChange={e=>setForm(f=>({...f,model:e.target.value}))} style={inputStyle}>
                {MODELS.map(m=><option key={m}>{m}</option>)}
              </select>
            </label>
            <label style={labelStyle}><span>สี</span>
              <select value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))} style={inputStyle}>
                {COLORS.map(c=><option key={c}>{c}</option>)}
              </select>
            </label>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"#666",fontWeight:700,marginBottom:6}}>ไซส์และจำนวน</div>
            <div style={{display:"flex",gap:5,marginBottom:6}}>
              <select value={sizeInput.size} onChange={e=>setSizeInput(s=>({...s,size:e.target.value}))} style={{...inputStyle,flex:1}}>
                {SIZES.map(s=><option key={s}>{s}</option>)}
              </select>
              <input type="number" min="1" placeholder="จำนวน" value={sizeInput.qty}
                onChange={e=>setSizeInput(s=>({...s,qty:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&addSizeToForm()}
                style={{...inputStyle,flex:1}}/>
              <button onClick={addSizeToForm} style={{padding:"7px 12px",borderRadius:7,border:"none",cursor:"pointer",fontWeight:800,background:"#3b82f6",color:"#fff"}}>+</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,minHeight:32,background:"#0e0e14",borderRadius:7,padding:6}}>
              {Object.entries(form.sizes).length===0
                ?<span style={{color:"#2a2a34",fontSize:11}}>ยังไม่มีไซส์</span>
                :Object.entries(form.sizes).sort(([a],[b])=>parseFloat(a)-parseFloat(b)).map(([sz,qty])=>(
                  <span key={sz} onClick={()=>{const s={...form.sizes};delete s[sz];setForm(f=>({...f,sizes:s}));}}
                    style={{background:"#1e3a5f",color:"#60a5fa",padding:"2px 8px",borderRadius:99,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                    {sz}×{qty} ✕
                  </span>
                ))
              }
            </div>
          </div>
          <label style={{...labelStyle,marginBottom:14}}>
            <span>หมายเหตุ / SKU</span>
            <input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={inputStyle} placeholder="เช่น SP BL39 · SK DC41"/>
          </label>
          <div style={{display:"flex",gap:7,justifyContent:"flex-end"}}>
            <button onClick={()=>setShowNewOrder(false)} style={{padding:"7px 14px",borderRadius:7,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#666",fontSize:12}}>ยกเลิก</button>
            <button onClick={createOrder} disabled={!totalFormPairs} style={{
              padding:"7px 16px",borderRadius:7,border:"none",cursor:"pointer",fontWeight:800,fontSize:12,
              background:totalFormPairs?`linear-gradient(135deg,${ORDER_TYPES[form.type].color},${ORDER_TYPES[form.type].color}cc)`:"#1a1a22",
              color:totalFormPairs?"#fff":"#333"}}>
              {ORDER_TYPES[form.type].icon} สร้าง
            </button>
          </div>
        </Modal>
      )}

      {/* ── DETAIL MODAL ── */}
      {selectedOrder&&(
        <OrderDetailModal
          order={selectedOrder}
          onClose={()=>setSelectedOrder(null)}
          onAdvancePairs={doAdvancePairs}
          onAdvanceAll={advanceAllInDept}
          onSetLabel={setPairLabel}
        />
      )}
    </div>
  );
}

/* ══════════ ORDER CARD ══════════ */
function OrderCard({ order, deptId, onSelect, onAdvanceAll, onFinishDirect, isDone }) {
  const t = ORDER_TYPES[order.type];
  const pairsHere  = deptId!=="done" ? getPairsInDept(order,deptId) : [];
  const totalHere  = pairsHere.reduce((s,p)=>s+p.qty,0);
  const curDepts   = getOrderCurrentDepts(order);
  const dept       = DEPARTMENTS.find(d=>d.id===deptId);
  const over       = pairsHere.some(p=>p.enteredAt&&(Date.now()-p.enteredAt)>ALERT_HOURS*3600000);
  const nextDept   = deptId!=="done"?DEPARTMENTS.find(d=>d.id===DEPT_ORDER[DEPT_ORDER.indexOf(deptId)+1]):null;

  return (
    <div onClick={onSelect} style={{background:"#16161c",border:`1px solid ${over?"#ef444455":isDone?"#22c55e28":dept?dept.color+"28":"#1e1e2c"}`,
      borderRadius:12,padding:14,cursor:"pointer",transition:"transform 0.1s",position:"relative",overflow:"hidden"}}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-1px)";}}
      onMouseLeave={e=>{e.currentTarget.style.transform="";}}>
      {/* stripe */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:over?4:3,background:
        over?"linear-gradient(90deg,#ef4444,#f97316)":
        order.type==="F1"?"linear-gradient(90deg,#ef4444,#f97316)":
        order.type==="L1"?"linear-gradient(90deg,#3b82f6,#60a5fa)":
                          "linear-gradient(90deg,#8b5cf6,#a78bfa)"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginTop:4,marginBottom:8}}>
        <div>
          <span style={{background:t.bg,color:t.color,fontSize:10,fontWeight:800,padding:"1px 7px",borderRadius:99}}>{t.icon}{order.type}</span>
          {over&&<span style={{background:"#ef444420",color:"#ef4444",fontSize:10,fontWeight:800,padding:"1px 6px",borderRadius:99,marginLeft:4}}>⚠️เกินเวลา</span>}
          <div style={{fontFamily:"monospace",fontSize:12,fontWeight:800,color:t.color,marginTop:3}}>{order.id}</div>
        </div>
        <div style={{textAlign:"right"}}>
          {!isDone&&deptId!=="done"&&<div style={{fontSize:24,fontWeight:900,color:over?"#ef4444":dept?.color,lineHeight:1}}>{totalHere}</div>}
          {isDone&&<div style={{fontSize:24,fontWeight:900,color:"#22c55e",lineHeight:1}}>{order.totalPairs}</div>}
          <div style={{fontSize:10,color:"#3a3a4a"}}>คู่</div>
        </div>
      </div>

      {/* pairs in this dept */}
      {!isDone&&deptId!=="done"&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:8}}>
          {pairsHere.sort((a,b)=>parseFloat(a.size)-parseFloat(b.size)).map(p=>{
            const hrs = p.enteredAt?(Date.now()-p.enteredAt)/3600000:0;
            const isLate = hrs > ALERT_HOURS;
            return (
              <span key={p.id} style={{background:isLate?"#ef444415":p.label?"#f59e0b10":"#0e0e14",
                border:`1px solid ${isLate?"#ef444444":p.label?"#f59e0b44":"#1a1a22"}`,
                padding:"2px 7px",borderRadius:6,fontSize:11,color:isLate?"#ef4444":p.label?"#f59e0b":"#aaa"}}>
                {p.model!==order.model||p.color!==order.color?`${p.model}${p.color} `:""}
                {p.size}{p.qty>1&&<span style={{color:"#f59e0b",fontWeight:700}}>×{p.qty}</span>}
                {p.label&&<span style={{fontSize:9}}> 🏷</span>}
                {isLate&&<span style={{fontSize:9}}> ⏰</span>}
              </span>

            <div key={dId} title={`${d2.short}: ${cnt}คู่`}
              style={{flex:cnt||0,minWidth:cnt>0?6:2,height:4,borderRadius:2,

        {(order.pairs||[]).some(p=>p.currentDept==="done")&&

      {!isDone&&curDepts.length>1&&(

          {curDepts.filter(d=>d!==deptId).map(d=>{

      {order.note&&<div style={{fontSize:10,color:"#a8860a",background:"#1a1600",borderRadius:5,padding:"3px 6px",marginBottom:7,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📋{order.note}</div>}

            <button onClick={onSelect} style={{flex:1,padding:"5px",borderRadius:7,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#888",fontSize:11}}>

            <button onClick={onAdvanceAll} style={{flex:1,padding:"5px",borderRadius:7,border:"none",cursor:"pointer",fontSize:11,fontWeight:800,color:"#fff",

            </button>
          </div>
          {onFinishDirect&&(
            <button onClick={onFinishDirect} style={{width:"100%",padding:"6px",borderRadius:7,border:"none",cursor:"pointer",fontSize:12,fontWeight:800,color:"#fff",background:"linear-gradient(135deg,#22c55e,#16a34a)"}}>

      {isDone&&<div style={{background:"#22c55e16",color:"#22c55e",borderRadius:7,padding:"5px",textAlign:"center",fontSize:11,fontWeight:700}}>✅ เสร็จสิ้น</div>}
    </div>
  );
}

/* ══════════ ORDER DETAIL MODAL ══════════ */
function OrderDetailModal({ order, onClose, onAdvancePairs, onAdvanceAll, onSetLabel }) {
  const t = ORDER_TYPES[order.type];
  const [selected, setSelected] = useState({}); // { pairId: qty }

  const toggleSelect = (pairId, maxQty) => {
    setSelected(s=>{
      if (s[pairId]) { const n={...s}; delete n[pairId]; return n; }
      return {...s, [pairId]: maxQty};
    });
  };
  const setQty = (pairId, qty, max) => {
    const v = Math.max(1,Math.min(max,parseInt(qty)||1));
    setSelected(s=>({...s,[pairId]:v}));
  };

  const activeByDept = DEPT_ORDER.reduce((acc,dId)=>{
    const pairs = getPairsInDept(order,dId);
    if (pairs.length>0) acc[dId]=pairs;
    return acc;
  },{});
  const donePairs = (order.pairs||[]).filter(p=>p.currentDept==="done");

  const selectedCount = Object.values(selected).reduce((s,q)=>s+q,0);

  const handleAdvanceSelected = () => {
    Object.entries(selected).forEach(([pairId,qty])=>onAdvancePairs(order.id,pairId,qty));
    setSelected({});
  };

  return (
    <Modal onClose={onClose} title={`📋 ${order.id}`}>
      {/* header */}
      <div style={{background:t.bg,border:`1px solid ${t.color}40`,borderRadius:10,padding:"8px 12px",
        display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <span style={{fontSize:22}}>{t.icon}</span>
        <div><div style={{fontWeight:900,color:t.color,fontSize:15}}>{order.type} — {t.label}</div>
          <div style={{fontSize:11,color:t.color+"77"}}>{order.note}</div></div>
        <div style={{marginLeft:"auto",textAlign:"right"}}>
          <div style={{fontSize:26,fontWeight:900,color:t.color,lineHeight:1}}>{order.totalPairs}</div>
          <div style={{fontSize:9,color:t.color+"88"}}>คู่รวม</div>
        </div>
      </div>

      {/* selected action bar */}
      {selectedCount>0&&(
        <div style={{background:"#10b98114",border:"1px solid #10b98140",borderRadius:9,padding:"8px 12px",
          marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:"#10b981",fontWeight:700}}>เลือก {selectedCount} คู่</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setSelected({})} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#666",fontSize:11}}>ยกเลิก</button>
            <button onClick={handleAdvanceSelected} style={{padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",fontWeight:800,fontSize:11,background:"#10b981",color:"#fff"}}>
              → ส่งต่อ {selectedCount} คู่
            </button>
          </div>
        </div>
      )}

      {/* pairs by dept */}
      {Object.entries(activeByDept).map(([deptId,pairs])=>{
        const dept = DEPARTMENTS.find(d=>d.id===deptId);
        const totalHere = pairs.reduce((s,p)=>s+p.qty,0);
        return (
          <div key={deptId} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,
              borderLeft:`3px solid ${dept.color}`,paddingLeft:8}}>
              <span>{dept.icon}</span>
              <span style={{fontWeight:800,color:dept.color,fontSize:13}}>{dept.name}</span>
              {dept.staff.length>0&&<span style={{fontSize:11,color:"#555"}}>· {dept.staff.join("·")}</span>}
              <span style={{marginLeft:"auto",background:dept.color+"20",color:dept.color,borderRadius:99,padding:"1px 8px",fontSize:11,fontWeight:700}}>
                {totalHere}คู่
              </span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {pairs.sort((a,b)=>parseFloat(a.size)-parseFloat(b.size)).map(p=>{
                const hrs      = p.enteredAt?(Date.now()-p.enteredAt)/3600000:0;
                const isLate   = hrs>ALERT_HOURS;
                const isSel    = !!selected[p.id];
                const selQty   = selected[p.id]||p.qty;
                const nextIdx = DEPT_ORDER.indexOf(deptId); const nextDept = nextIdx < DEPT_ORDER.length-1 ? DEPARTMENTS.find(d=>d.id===DEPT_ORDER[nextIdx+1]) : null;
                return (

                      border:`1px solid ${isSel?"#10b981":isLate?"#ef444433":p.label?"#f59e0b44":"#1a1a22"}`,
                      borderRadius:9,padding:"9px 11px",transition:"all 0.15s"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>

                          <span style={{fontSize:12,color:"#888"}}>{p.color}</span>
                          <span style={{background:"#1e1e2c",padding:"1px 6px",borderRadius:5,fontSize:12,fontWeight:700}}>ไซส์ {p.size}</span>

                          {p.enteredAt?`เข้ามา ${formatDate(p.enteredAt)} · ${elapsedStr(Date.now()-p.enteredAt)}`:"-"}
                        </div>
                      </div>
                      {/* qty control */}
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        {isSel&&p.qty>1&&(
                          <div style={{display:"flex",alignItems:"center",gap:3}}>
                            <button onClick={e=>{e.stopPropagation();setQty(p.id,selQty-1,p.qty);}}
                              style={{width:22,height:22,borderRadius:5,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#888",fontSize:14,lineHeight:1}}>-</button>
                            <input type="number" value={selQty} min={1} max={p.qty}
                              onChange={e=>setQty(p.id,e.target.value,p.qty)}
                              style={{width:32,textAlign:"center",background:"#13131a",border:"1px solid #1e1e2c",borderRadius:5,color:"#e4e0d8",fontSize:12,padding:"2px 0"}}/>
                            <button onClick={e=>{e.stopPropagation();setQty(p.id,selQty+1,p.qty);}}
                              style={{width:22,height:22,borderRadius:5,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#888",fontSize:14,lineHeight:1}}>+</button>
                          </div>
                        )}
                        <div style={{textAlign:"center",minWidth:36}}>

                    {/* advance with qty control */}

                      <AdvanceRow
                        pairQty={Number(p.qty)||1}
                        deptColor={dept.color}
                        nextShort={nextDept?.short || "จบงาน"}
                        onAdvance={(qty)=>onAdvancePairs(order.id,p.id,qty)}
                      />

              })}
            </div>
          </div>
        );
      })}

      {/* done pairs */}
      {donePairs.length>0&&(
        <div style={{marginBottom:10}}>
          <div style={{borderLeft:"3px solid #22c55e",paddingLeft:8,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontWeight:800,color:"#22c55e",fontSize:13}}>✅ เสร็จสิ้น</span>
            <span style={{marginLeft:"auto",background:"#22c55e20",color:"#22c55e",borderRadius:99,padding:"1px 8px",fontSize:11,fontWeight:700}}>
              {donePairs.reduce((s,p)=>s+p.qty,0)}คู่
            </span>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {donePairs.sort((a,b)=>parseFloat(a.size)-parseFloat(b.size)).map(p=>(
              <span key={p.id} style={{background:"#22c55e14",color:"#22c55e",padding:"3px 8px",borderRadius:6,fontSize:11,fontWeight:600}}>
                {p.model}{p.color} {p.size}{p.qty>1&&<span style={{fontWeight:800}}>×{p.qty}</span>}
              </span>
            ))}
          </div>
        </div>
      )}

      {/* history log */}
      {order.history?.length>0&&(
        <div style={{borderTop:"1px solid #1a1a22",paddingTop:10,marginTop:4}}>
          <div style={{fontSize:10,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:7}}>ประวัติแผนก</div>
          {order.history.map((h,i)=>{

    </Modal>
  );
}

/* ══════════ STAFF VIEW ══════════ */
function StaffView({ orders, tick, onSelectOrder }) {
  const staffList = useMemo(()=>{
    const names=new Set();
    DEPARTMENTS.forEach(d=>d.staff.forEach(s=>names.add(s)));
    return Array.from(names);
  },[]);

  return (
    <div style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <div style={{width:4,height:20,borderRadius:2,background:"#f59e0b"}}/>
        <h2 style={{margin:0,fontSize:16,fontWeight:800}}>งานแยกตามช่าง</h2>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
        {staffList.map(name=>{
          const color = STAFF_COLOR[name]||"#888";
          const dept  = DEPARTMENTS.find(d=>d.staff.includes(name));
          // find pairs currently in staff's dept that are active
          const activePairs = [];
          if (dept) {
            orders.forEach(o=>{
              const pairs=getPairsInDept(o,dept.id);
              if (pairs.length>0) activePairs.push({order:o,pairs});
            });
          }
          const histWork = [];
          orders.forEach(o=>{
            (o.history||[]).forEach(h=>{
              if (h.note&&h.note.includes(name.replace("ช่าง","ช่าง"))) {
                histWork.push({order:o,dept:h.dept,note:h.note,time:h.time,endTime:h.endTime});
              }
            });
          });
          const totalActive = activePairs.reduce((s,{pairs})=>s+pairs.reduce((ss,p)=>ss+p.qty,0),0);
          const overdueCount = activePairs.reduce((s,{pairs})=>s+pairs.filter(p=>p.enteredAt&&(Date.now()-p.enteredAt)>ALERT_HOURS*3600000).length,0);

          return (
            <div key={name} style={{background:"#16161c",border:`1px solid ${overdueCount?"#ef444455":color+"33"}`,borderRadius:12,overflow:"hidden"}}>
              {/* header */}
              <div style={{background:`linear-gradient(135deg,${color}20,${color}08)`,borderBottom:`1px solid ${color}22`,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:42,height:42,borderRadius:"50%",background:`linear-gradient(135deg,${color},${color}99)`,
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"#fff",flexShrink:0}}>
                  {name.replace("ช่าง","").slice(0,1)}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:900,fontSize:14,color}}>{name}</div>
                  {dept&&<div style={{fontSize:11,color:dept.color,marginTop:1}}>{dept.icon} {dept.name}</div>}
                  <div style={{display:"flex",gap:5,marginTop:4}}>
                    <span style={{background:"#1e1e2c",borderRadius:99,padding:"1px 7px",fontSize:10,color:"#777"}}>🔄 {totalActive}คู่กำลังทำ</span>
                    {overdueCount>0&&<span style={{background:"#ef444420",borderRadius:99,padding:"1px 7px",fontSize:10,color:"#ef4444",fontWeight:700}}>⚠️{overdueCount}</span>}
                  </div>
                </div>
              </div>
              {/* work items */}
              <div style={{padding:"10px 12px",maxHeight:360,overflowY:"auto"}}>
                {activePairs.length===0&&histWork.length===0&&<div style={{textAlign:"center",padding:20,color:"#2a2a38",fontSize:12}}>ยังไม่มีงาน</div>}
                {activePairs.map(({order,pairs})=>{
                  const t=ORDER_TYPES[order.type];
                  const total=pairs.reduce((s,p)=>s+p.qty,0);
                  return (
                    <div key={order.id} onClick={()=>onSelectOrder(order)}
                      style={{background:"#0e0e14",border:"1px solid #1e1e2c",borderRadius:9,padding:"9px 11px",marginBottom:7,cursor:"pointer"}}
                      onMouseEnter={e=>e.currentTarget.style.background="#13131a"}
                      onMouseLeave={e=>e.currentTarget.style.background="#0e0e14"}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <div>
                          <span style={{background:t.bg,color:t.color,fontSize:10,fontWeight:800,padding:"1px 6px",borderRadius:99}}>{t.icon}{order.type}</span>
                          <span style={{fontFamily:"monospace",fontWeight:800,color:t.color,fontSize:12,marginLeft:6}}>{order.id}</span>
                        </div>
                        <span style={{fontWeight:900,color,fontSize:16}}>{total}<span style={{fontSize:10,color:"#555",fontWeight:400}}> คู่</span></span>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                        {pairs.sort((a,b)=>parseFloat(a.size)-parseFloat(b.size)).map(p=>{
                          const late=p.enteredAt&&(Date.now()-p.enteredAt)>ALERT_HOURS*3600000;
                          return <span key={p.id} style={{background:late?"#ef444415":"#1a1a22",color:late?"#ef4444":"#888",
                            border:`1px solid ${late?"#ef444433":"#1e1e2c"}`,borderRadius:5,padding:"1px 6px",fontSize:10}}>
                            {p.model}{p.color}{p.size}{p.qty>1&&`×${p.qty}`}
                          </span>
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ══════════ ADVANCE ROW ══════════ */
function AdvanceRow({ pairQty, deptColor, nextShort, onAdvance }) {
  const [qty, setQty] = useState(pairQty);
  const max = pairQty;

  const handleMinus = (e) => { e.stopPropagation(); setQty(q => Math.max(1, q-1)); };
  const handlePlus  = (e) => { e.stopPropagation(); setQty(q => Math.min(max, q+1)); };
  const handleSend  = (e) => { e.stopPropagation(); onAdvance(qty); };

  return (
    <div style={{marginTop:7,display:"flex",gap:5,alignItems:"center"}} onClick={e=>e.stopPropagation()}>
      {/* qty selector - แสดงเฉพาะถ้ามีมากกว่า 1 คู่ */}
      {max > 1 && (
        <div style={{display:"flex",alignItems:"center",gap:3,background:"#0e0e14",borderRadius:6,padding:"2px 4px",border:"1px solid #1e1e2c"}}>
          <button onClick={handleMinus}
            style={{width:22,height:22,borderRadius:4,border:"none",cursor:"pointer",
              background:qty>1?"#1e1e2c":"#0e0e14",color:qty>1?"#aaa":"#333",fontSize:14,lineHeight:1,fontWeight:800}}>
            −
          </button>
          <span style={{minWidth:24,textAlign:"center",fontSize:13,fontWeight:800,color:"#e4e0d8"}}>{qty}</span>
          <button onClick={handlePlus}
            style={{width:22,height:22,borderRadius:4,border:"none",cursor:"pointer",
              background:qty<max?"#1e1e2c":"#0e0e14",color:qty<max?"#aaa":"#333",fontSize:14,lineHeight:1,fontWeight:800}}>
            +
          </button>
        </div>
      )}
      <button onClick={handleSend}
        style={{flex:1,padding:"5px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:800,color:"#fff",
          background:`linear-gradient(135deg,${deptColor},${deptColor}cc)`}}>
        → ส่ง {qty < max ? `${qty} จาก ${max}` : `ทั้ง ${max}`} คู่{nextShort ? ` ไป${nextShort}` : ""}
      </button>
    </div>
  );
}

/* ══════════ LABEL FIELD ══════════ */
function LabelField({ pairId, orderId, label, onSetLabel }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal]         = useState(label);

  const save = () => {
    onSetLabel(orderId, pairId, val);
    setEditing(false);
  };

  if (editing) return (
    <div style={{display:"flex",gap:4,alignItems:"center",marginTop:4}} onClick={e=>e.stopPropagation()}>
      <input autoFocus value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>{ if(e.key==="Enter")save(); if(e.key==="Escape")setEditing(false); }}
        placeholder="เช่น KNBL39-F1002-120326"
        style={{flex:1,padding:"3px 7px",borderRadius:6,border:"1px solid #f59e0b88",background:"#1a1400",
          color:"#f59e0b",fontSize:11,outline:"none"}}/>
      <button onClick={save} style={{padding:"3px 8px",borderRadius:5,border:"none",cursor:"pointer",
        background:"#f59e0b",color:"#000",fontSize:11,fontWeight:800}}>บันทึก</button>
      <button onClick={()=>setEditing(false)} style={{padding:"3px 7px",borderRadius:5,border:"1px solid #1e1e2c",
        cursor:"pointer",background:"transparent",color:"#666",fontSize:11}}>✕</button>
    </div>
  );

  return (
    <div style={{display:"flex",alignItems:"center",gap:5,marginTop:4}} onClick={e=>e.stopPropagation()}>
      {label
        ? <span style={{background:"#f59e0b14",color:"#f59e0b",borderRadius:5,padding:"2px 7px",fontSize:11,fontWeight:700,
            border:"1px solid #f59e0b44",fontFamily:"monospace"}}>🏷 {label}</span>
        : <span style={{color:"#2a2a38",fontSize:10}}>ยังไม่มีรหัสสลาก</span>
      }
      <button onClick={()=>{setVal(label);setEditing(true);}}
        style={{padding:"1px 6px",borderRadius:4,border:"1px solid #1e1e2c",cursor:"pointer",
          background:"transparent",color:"#555",fontSize:10}}>
        {label?"✏️ แก้":"+ ใส่รหัส"}
      </button>
    </div>
  );
}

/* ══════════ MODAL ══════════ */
function Modal({ children, onClose, title }) {
  return (
    <div style={{position:"fixed",inset:0,background:"#000000d0",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{background:"#16161c",borderRadius:14,padding:20,width:"100%",maxWidth:540,border:"1px solid #1e1e2c",maxHeight:"92vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:800}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

const labelStyle = {display:"flex",flexDirection:"column",gap:3,fontSize:12,color:"#666",fontWeight:600};
const inputStyle = {padding:"7px 9px",borderRadius:7,border:"1px solid #1e1e2c",background:"#0e0e14",color:"#e4e0d8",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"};


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
