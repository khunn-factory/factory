/* ═══════ ADVANCE LOGIC ═══════ */
const advanceSomePairs = (orders, orderId, pairId, qtyToAdvance) => {
  return orders.map(o => {
    if(o.id!==orderId) return o;
    const pair = o.pairs.find(p=>p.id===pairId);
    if(!pair) return o;
    const curIdx  = DEPT_ORDER.indexOf(pair.currentDept);
    const nextDept = curIdx>=DEPT_ORDER.length-1?"done":DEPT_ORDER[curIdx+1];
    const qty = Math.min(qtyToAdvance, Number(pair.qty)||1);
    let newPairs = o.pairs.filter(p=>p.id!==pairId);
    if((Number(pair.qty)||1)-qty>0) newPairs.push({...pair,qty:(Number(pair.qty)||1)-qty});
    const existing = newPairs.find(p=>p.model===pair.model&&p.color===pair.color&&p.size===pair.size&&p.currentDept===nextDept&&!p.label&&!pair.label);
    if(existing) newPairs=newPairs.map(p=>p.id===existing.id?{...p,qty:(Number(p.qty)||1)+qty}:p);
    else newPairs.push({id:newPid(),model:pair.model,color:pair.color,size:pair.size,qty,currentDept:nextDept,enteredAt:Date.now(),label:pair.label});
    return {...o,pairs:newPairs};
  });
};

/* ═══════ API ═══════ */
const apiGet = async () => {
  const r = await fetch(API_URL+"?ts="+Date.now());
  const j = await r.json();
  if(!j.ok) throw new Error(j.error);
  return j.data;
};
const apiSaveAll = async (orders) => {
  const r = await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"saveAll",payload:{orders}})});
  const j = await r.json();
  if(!j.ok) throw new Error(j.error);
  return j.result;
};

/* ═══════ MAIN APP ═══════ */
function App() {
  const [orders,setOrders]         = useState([]);
  const [loading,setLoading]       = useState(true);
  const [syncStatus,setSyncStatus] = useState("offline");
  const [activeView,setActiveView] = useState("board");
  const [activeDept,setActiveDept] = useState("lace");
  const [selOrder,setSelOrder]     = useState(null);
  const [showNew,setShowNew]       = useState(false);
  const [showAlerts,setShowAlerts] = useState(false);
  const [filterType,setFilterType] = useState("all");
  const [search,setSearch]         = useState("");
  const [tick,setTick]             = useState(0);
  const [form,setForm]             = useState({type:"F1",model:"SP",color:"BL",sizes:{},note:""});
  const [sizeIn,setSizeIn]         = useState({size:"39",qty:""});
  const syncRef = useRef(null);

  useEffect(()=>{ const t=setInterval(()=>setTick(n=>n+1),60000); return()=>clearInterval(t); },[]);

  // ── load ──
  useEffect(()=>{
    // ถ้ามี API → ดึงจาก Sheets ก่อนเสมอ (ข้อมูลล่าสุดจริงๆ)
    if(isApiOk()&&navigator.onLine){
      (async()=>{
        try{
          setSyncStatus("syncing");
          const data = await apiGet();
          if(data&&data.length>0){
            // มีข้อมูลใน Sheets → ใช้เลย
            setOrders(data); saveToCache(data);
            setSyncStatus("online");
          } else {
            // Sheets ว่าง → push seed data ขึ้นครั้งแรก
            const seed = getSeedData();
            setOrders(seed); saveToCache(seed);
            await apiSaveAll(seed);
            setSyncStatus("online");
            showToast("✅ sync ข้อมูลขึ้น Google Sheets แล้ว!");
          }
        }catch(e){
          // ถ้า Sheets ใช้ไม่ได้ → ใช้ cache หรือ seed
          setSyncStatus("offline");
          const cached = loadFromCache();
          if(cached.length){ setOrders(cached); }
          else { const seed=getSeedData(); setOrders(seed); saveToCache(seed); }
        }
        setLoading(false);
      })();
    } else {
      // ออฟไลน์ → ใช้ cache หรือ seed
      const cached = loadFromCache();
      if(cached.length){ setOrders(cached); }
      else { const seed=getSeedData(); setOrders(seed); saveToCache(seed); }
      setLoading(false);
    }
  },[]);

  useEffect(()=>{
    if(!isApiOk()) return;
    syncRef.current = setInterval(()=>{ if(navigator.onLine) syncNow(); }, SYNC_INTERVAL);
    return()=>clearInterval(syncRef.current);
  },[]);

  const syncNow = async (isInit=false) => {
    if(!isApiOk()) return;
    try {
      setSyncStatus("syncing");
      const data = await apiGet();
      setOrders(data); saveToCache(data); setSyncStatus("online");
      if(!isInit) showToast("✅ ซิงก์แล้ว");
    } catch { setSyncStatus("offline"); if(!isInit) showToast("⚠️ ซิงก์ไม่สำเร็จ","#f59e0b"); }
    setLoading(false);
  };

  const pushCloud = async (newOrders) => {
    saveToCache(newOrders);
    if(!isApiOk()||!navigator.onLine) return;
    try { setSyncStatus("syncing"); await apiSaveAll(newOrders); setSyncStatus("online"); }
    catch { setSyncStatus("offline"); showToast("⚠️ บันทึกออฟไลน์","#f59e0b"); }
  };

  const updOrders = (d) => { saveToCache(d); setOrders(d); pushCloud(d); };

  /* actions */
  const doAdvance = (orderId,pairId,qty) => {
    const updated = advanceSomePairs(orders,orderId,pairId,qty);
    const uo = updated.find(o=>o.id===orderId);
    if(uo) setSelOrder(uo);
    updOrders(updated);
  };

  const advanceAll = (orderId,deptId) => {
    const order = orders.find(o=>o.id===orderId);
    if(!order) return;
    let cur = orders;
    getPairsInDept(order,deptId).forEach(p=>{ cur=advanceSomePairs(cur,orderId,p.id,Number(p.qty)||1); });
    const uo = cur.find(o=>o.id===orderId);
    if(uo) setSelOrder(uo);
    updOrders(cur);
  };

  const finishDirect = (orderId) => {
    let cur = orders;
    // finish→deliver
    const o1 = cur.find(o=>o.id===orderId);
    if(o1&&getPairsInDept(o1,"finish").length>0)
      [...getPairsInDept(o1,"finish")].forEach(p=>{ cur=advanceSomePairs(cur,orderId,p.id,Number(p.qty)||1); });
    // deliver→done
    const o2 = cur.find(o=>o.id===orderId);
    if(o2) [...getPairsInDept(o2,"deliver")].forEach(p=>{ cur=advanceSomePairs(cur,orderId,p.id,Number(p.qty)||1); });
    setSelOrder(null);
    updOrders(cur);
    showToast("✅ จบงานเรียบร้อย!");
  };

  const setLabel = (orderId,pairId,label) => {
    const updated = orders.map(o=>o.id!==orderId?o:{...o,pairs:o.pairs.map(p=>p.id===pairId?{...p,label:label||undefined}:p)});
    const uo = updated.find(o=>o.id===orderId);
    if(uo) setSelOrder(uo);
    updOrders(updated);
  };

  const createOrder = () => {
    if(!Object.keys(form.sizes).length) return;
    const id = genId(form.type);
    const totalPairs = Object.values(form.sizes).reduce((a,b)=>a+b,0);
    const pairs = Object.entries(form.sizes).map(([size,qty])=>({id:newPid(),model:form.model,color:form.color,size,qty,currentDept:"pump",enteredAt:Date.now()}));
    const newOrder = {id,type:form.type,model:form.model,color:form.color,totalPairs,createdAt:Date.now(),note:form.note,pairs,history:[{dept:"pump",status:"in_progress",time:Date.now(),note:""}]};
    updOrders([newOrder,...orders]);
    setForm({type:"F1",model:"SP",color:"BL",sizes:{},note:""}); setShowNew(false);
    showToast("✅ สร้างใบงาน "+id+" แล้ว");
  };

  /* computed */
  const overdues = useMemo(()=>orders.filter(o=>!orderDone(o)&&isOverdue(o)),[orders,tick]);
  const doneList  = orders.filter(orderDone);
  const counts    = {F1:orders.filter(o=>o.type==="F1"&&!orderDone(o)).length,L1:orders.filter(o=>o.type==="L1"&&!orderDone(o)).length,L2:orders.filter(o=>o.type==="L2"&&!orderDone(o)).length};
  const getDList  = d => sortOrders((filterType==="all"?orders:orders.filter(o=>o.type===filterType)).filter(o=>isOrderInDept(o,d)));
  const searchRes = useMemo(()=>{
    if(!search.trim()) return [];
    const q=search.toLowerCase().replace(/[-\s]/g,"");
    return orders.filter(o=>[o.id,o.model,o.color,o.note||"",...(o.pairs||[]).map(p=>`${p.model}${p.color}${p.size}${p.label||""}`)].join(" ").toLowerCase().replace(/[-\s]/g,"").includes(q));
  },[search,orders]);

  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}><div style={{fontSize:48}}>👟</div><div style={{color:"#888",fontSize:14}}>กำลังโหลด...</div></div>;

  return (
    <div style={{minHeight:"100vh",background:"#0c0c10",color:"#e4e0d8"}}>

      {/* HEADER */}
      <div style={{background:"#111118",borderBottom:"1px solid #1e1e2c",padding:"0 12px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#f59e0b,#d97706)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>👟</div>
          <div>
            <div style={{fontWeight:800,fontSize:13}}>ใบงานโรงงาน KHUNN</div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span className={`sdot ${syncStatus}`}/>
              <span style={{fontSize:9,color:"#555"}}>{syncStatus==="online"?"ออนไลน์":syncStatus==="syncing"?"ซิงก์...":"ออฟไลน์"}</span>
              {Object.entries(ORDER_TYPES).map(([k,t])=><span key={k} style={{fontSize:9,color:t.color,fontWeight:700}}>{t.icon}{counts[k]}</span>)}
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          <div style={{position:"relative"}}>
            <input value={search} onChange={e=>{setSearch(e.target.value);if(e.target.value)setActiveView("search");}}
              placeholder="🔍 ค้นหา..."
              style={{padding:"5px 8px 5px 8px",borderRadius:7,border:"1px solid",width:130,borderColor:search?"#3b82f6":"#1e1e2c",background:"#16161c",color:"#e4e0d8",fontSize:11,outline:"none"}}/>
            {search&&<button onClick={()=>{setSearch("");setActiveView("board");}} style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:14}}>×</button>}
          </div>
          <button onClick={()=>setShowAlerts(true)} style={{position:"relative",padding:"4px 8px",borderRadius:6,border:"1px solid",cursor:"pointer",borderColor:overdues.length?"#ef4444":"#1e1e2c",background:overdues.length?"#ef444414":"#16161c",color:overdues.length?"#ef4444":"#555",fontSize:14}}>
            🔔{overdues.length>0&&<span style={{position:"absolute",top:-4,right:-4,width:14,height:14,borderRadius:"50%",background:"#ef4444",color:"#fff",fontSize:8,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{overdues.length}</span>}
          </button>
          {isApiOk()&&<button onClick={()=>syncNow()} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#555",fontSize:11}} title="ซิงก์">🔄</button>}
          <button onClick={()=>setShowNew(true)} style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:800,background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff"}}>+ ใบงาน</button>
        </div>
      </div>

      {/* NAV */}
      <div style={{background:"#111118",borderBottom:"1px solid #1e1e2c",padding:"0 12px",display:"flex",gap:2}}>
        {[["board","📋 บอร์ด"],["list","📃 รายการ"],["staff","👷 ช่าง"],["done","✅ เสร็จ"]].map(([v,lbl])=>(
          <button key={v} onClick={()=>{setActiveView(v);setSearch("");}} style={{padding:"8px 12px",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:"transparent",color:activeView===v&&!search?"#f59e0b":"#555",borderBottom:activeView===v&&!search?"2px solid #f59e0b":"2px solid transparent"}}>{lbl}</button>

      </div>

      {/* TYPE FILTER */}
      <div style={{background:"#0e0e14",borderBottom:"1px solid #1a1a22",padding:"6px 12px",display:"flex",gap:4}}>

          <button key={v} onClick={()=>setFilterType(v)} style={{padding:"3px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:filterType===v?color:"#16161c",color:filterType===v?(v==="all"?"#111":"#fff"):"#555"}}>{lbl}</button>
        ))}
      </div>

      {/* SEARCH */}
      {activeView==="search"&&<div style={{padding:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <h2 style={{margin:0,fontSize:15,fontWeight:800}}>ค้นหา "{search}"</h2>
          <span style={{background:"#3b82f620",color:"#3b82f6",borderRadius:99,padding:"2px 8px",fontSize:11}}>{searchRes.length} รายการ</span>
        </div>
        {searchRes.length===0?<div style={{textAlign:"center",padding:40,color:"#333"}}>🔍 ไม่พบข้อมูล</div>
          :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
            {searchRes.map(o=><OCard key={o.id} order={o} deptId={getOrderDepts(o)[0]||"done"} onSelect={()=>setSelOrder(o)} isDone={orderDone(o)}/>)}
          </div>}
      </div>}

      {/* BOARD */}
      {activeView==="board"&&<div style={{padding:12}}>
        <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
          {DEPARTMENTS.map(dept=>{
            const list=getDList(dept.id);
            const total=list.reduce((s,o)=>s+getTotalInDept(o,dept.id),0);
            const over=list.some(o=>getPairsInDept(o,dept.id).some(p=>p.enteredAt&&(Date.now()-Number(p.enteredAt))>ALERT_HRS*3600000));
            return <button key={dept.id} onClick={()=>setActiveDept(dept.id)} style={{flex:"0 0 auto",padding:"8px 10px",borderRadius:9,textAlign:"left",border:`2px solid ${activeDept===dept.id?dept.color:over?"#ef444444":"#1e1e2c"}`,background:activeDept===dept.id?dept.color+"16":"#16161c",cursor:"pointer",minWidth:80,position:"relative"}}>
              {over&&<span style={{position:"absolute",top:4,right:4,fontSize:10}}>⚠️</span>}
              <div style={{fontSize:14}}>{dept.icon}</div>
              <div style={{fontSize:10,fontWeight:700,color:activeDept===dept.id?dept.color:"#bbb",marginTop:1}}>{dept.short}</div>
              {dept.staff.length>0&&<div style={{fontSize:8,color:"#444"}}>{dept.staff.join("·")}</div>}
              <div style={{fontSize:9,color:dept.color,marginTop:3}}>{list.length>0?`${list.length}ล็อต·${total}คู่`:"ว่าง"}</div>
            </button>;
          })}
        </div>

        {(()=>{
          const dept=DEPARTMENTS.find(d=>d.id===activeDept);
          if(!dept) return null;
          const list=getDList(activeDept);
          return <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <div style={{width:3,height:18,borderRadius:2,background:dept.color}}/>
              <span style={{fontWeight:800,fontSize:15}}>{dept.name}</span>
              {dept.staff.length>0&&<span style={{background:"#1e1e2c",color:"#666",borderRadius:99,padding:"2px 8px",fontSize:10}}>{dept.staff.join("·")}</span>}
              <span style={{background:dept.color+"20",color:dept.color,borderRadius:99,padding:"2px 8px",fontSize:10,fontWeight:700}}>{list.length}ล็อต · {list.reduce((s,o)=>s+getTotalInDept(o,activeDept),0)}คู่</span>
            </div>
            {list.length===0?<div style={{textAlign:"center",padding:50,color:"#2a2a38"}}><div style={{fontSize:32}}>📭</div>ไม่มีงาน</div>
              :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
                {list.map(o=><OCard key={o.id} order={o} deptId={activeDept}
                  onSelect={()=>setSelOrder(o)}
                  onAdvAll={()=>advanceAll(o.id,activeDept)}
                  onFinish={(activeDept==="finish"||activeDept==="deliver")?()=>finishDirect(o.id):null}/>)}
              </div>}
          </div>;
        })()}
      </div>}

      {/* LIST */}
      {activeView==="list"&&<div style={{padding:12,overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,background:"#16161c",borderRadius:10,overflow:"hidden",border:"1px solid #1e1e2c"}}>
          <thead><tr style={{background:"#1a1a22"}}>
            {["ประเภท","รหัส","แผนก","คู่","สร้าง",""].map((h,i)=><th key={i} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,color:"#444",fontSize:10}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {sortOrders(orders.filter(o=>filterType==="all"||o.type===filterType)).map((o,i)=>{
              const t=ORDER_TYPES[o.type]; const depts=getOrderDepts(o);
              return <tr key={o.id} onClick={()=>setSelOrder(o)} style={{borderBottom:"1px solid #13131a",cursor:"pointer",background:i%2?"#13131a":"transparent"}}>
                <td style={{padding:"7px 10px"}}><span style={{background:t.bg,color:t.color,padding:"1px 7px",borderRadius:99,fontSize:10,fontWeight:800}}>{t.icon}{o.type}</span></td>
                <td style={{padding:"7px 10px",fontFamily:"monospace",fontWeight:800,color:t.color}}>{o.id}</td>
                <td style={{padding:"7px 10px"}}>
                  {orderDone(o)?<span style={{color:"#22c55e",fontSize:10}}>✅</span>
                    :<div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
                      {depts.map(d=>{const d2=DEPARTMENTS.find(x=>x.id===d);return<span key={d} style={{background:d2.color+"20",color:d2.color,padding:"1px 5px",borderRadius:99,fontSize:9,fontWeight:700}}>{d2.icon}{getTotalInDept(o,d)}</span>;})}
                    </div>}
                </td>
                <td style={{padding:"7px 10px",fontWeight:800}}>{o.totalPairs}</td>
                <td style={{padding:"7px 10px",color:"#444",fontSize:10}}>{formatDate(o.createdAt)}</td>
                <td style={{padding:"7px 10px"}}><button onClick={e=>{e.stopPropagation();setSelOrder(o);}} style={{padding:"2px 8px",borderRadius:5,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#777",fontSize:10}}>ดู</button></td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>}

      {/* STAFF */}
      {activeView==="staff"&&<div style={{padding:12}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
          {[...new Set(DEPARTMENTS.flatMap(d=>d.staff))].map(name=>{
            const color=STAFF_COLOR[name]||"#888";
            const dept=DEPARTMENTS.find(d=>d.staff.includes(name));
            const items=[]; if(dept) orders.forEach(o=>{const p=getPairsInDept(o,dept.id);if(p.length)items.push({order:o,pairs:p});});
            const total=items.reduce((s,{pairs})=>s+pairs.reduce((ss,p)=>ss+(Number(p.qty)||1),0),0);
            return <div key={name} style={{background:"#16161c",border:`1px solid ${color}33`,borderRadius:12,overflow:"hidden"}}>
              <div style={{background:`linear-gradient(135deg,${color}20,${color}08)`,borderBottom:`1px solid ${color}22`,padding:"11px 13px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:38,height:38,borderRadius:"50%",background:`linear-gradient(135deg,${color},${color}99)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"#fff"}}>{name.replace("ช่าง","").slice(0,1)}</div>
                <div>
                  <div style={{fontWeight:900,fontSize:13,color}}>{name}</div>
                  {dept&&<div style={{fontSize:10,color:dept.color}}>{dept.icon}{dept.name}</div>}
                  <span style={{background:"#1e1e2c",borderRadius:99,padding:"1px 6px",fontSize:9,color:"#777"}}>🔄 {total}คู่</span>
                </div>
              </div>
              <div style={{padding:"9px 12px",maxHeight:250,overflowY:"auto"}}>
                {items.length===0?<div style={{textAlign:"center",padding:16,color:"#2a2a38",fontSize:11}}>ไม่มีงาน</div>
                  :items.map(({order,pairs})=>{const t=ORDER_TYPES[order.type];return(
                    <div key={order.id} onClick={()=>setSelOrder(order)} style={{background:"#0e0e14",border:"1px solid #1e1e2c",borderRadius:8,padding:"8px 10px",marginBottom:6,cursor:"pointer"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                        <div><span style={{background:t.bg,color:t.color,fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:99}}>{t.icon}{order.type}</span>
                          <span style={{fontFamily:"monospace",fontWeight:800,color:t.color,fontSize:11,marginLeft:6}}>{order.id}</span></div>
                        <span style={{fontWeight:900,color,fontSize:14}}>{pairs.reduce((s,p)=>s+(Number(p.qty)||1),0)}<span style={{fontSize:9,color:"#555"}}>คู่</span></span>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
                        {pairs.sort((a,b)=>parseFloat(a.size)-parseFloat(b.size)).map(p=><span key={p.id} style={{background:"#1a1a22",color:"#888",borderRadius:4,padding:"1px 5px",fontSize:9}}>{p.model}{p.color}{p.size}{(Number(p.qty)||1)>1&&`×${p.qty}`}</span>)}
                      </div>
                    </div>
                  );})}
              </div>
            </div>;
          })}
        </div>
      </div>}

      {/* DONE */}
      {activeView==="done"&&<div style={{padding:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:3,height:18,borderRadius:2,background:"#22c55e"}}/>
          <span style={{fontWeight:800,fontSize:15}}>เสร็จสิ้น</span>
          <span style={{background:"#22c55e20",color:"#22c55e",borderRadius:99,padding:"2px 8px",fontSize:10,fontWeight:700}}>{doneList.length} ล็อต</span>
        </div>
        {doneList.length===0?<div style={{textAlign:"center",padding:50,color:"#2a2a38"}}><div style={{fontSize:32}}>📭</div>ยังไม่มี</div>
          :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
            {doneList.map(o=><OCard key={o.id} order={o} deptId="done" onSelect={()=>setSelOrder(o)} isDone/>)}
          </div>}
      </div>}

      {/* ALERTS */}
      {showAlerts&&<Modal onClose={()=>setShowAlerts(false)} title="🔔 การแจ้งเตือน">
        {overdues.length===0?<div style={{textAlign:"center",padding:40,color:"#22c55e"}}><div style={{fontSize:36}}>✅</div>ทุกล็อตอยู่ในกำหนด</div>
          :overdues.map(o=>{const t=ORDER_TYPES[o.type];return(
            <div key={o.id} onClick={()=>{setSelOrder(o);setShowAlerts(false);}} style={{background:"#1a1a22",border:"1px solid #ef444433",borderRadius:10,padding:12,marginBottom:10,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div><span style={{background:t.bg,color:t.color,fontSize:10,fontWeight:800,padding:"1px 6px",borderRadius:99}}>{t.icon}{o.type}</span>
                  <span style={{fontFamily:"monospace",fontWeight:800,color:t.color,fontSize:12,marginLeft:8}}>{o.id}</span></div>
                <span style={{fontSize:10,color:"#ef4444",fontWeight:700}}>⚠️ เกิน {ALERT_HRS}ชม.</span>
              </div>
            </div>
          );})}
      </Modal>}

      {/* NEW ORDER */}
      {showNew&&<Modal onClose={()=>setShowNew(false)} title="➕ สร้างใบงานใหม่">
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:"#666",fontWeight:700,marginBottom:7}}>ประเภท</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            {Object.entries(ORDER_TYPES).map(([k,t])=>(
              <button key={k} onClick={()=>setForm(f=>({...f,type:k}))} style={{padding:"9px 8px",borderRadius:8,border:"2px solid",textAlign:"center",cursor:"pointer",borderColor:form.type===k?t.color:"#1e1e2c",background:form.type===k?t.bg:"#111116"}}>
                <div style={{fontSize:18}}>{t.icon}</div>
                <div style={{fontWeight:800,fontSize:12,color:form.type===k?t.color:"#aaa"}}>{k}</div>
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <label style={{display:"flex",flexDirection:"column",gap:3,fontSize:11,color:"#666",fontWeight:600}}><span>รุ่น</span>
            <select value={form.model} onChange={e=>setForm(f=>({...f,model:e.target.value}))} style={iStyle}>{MODELS.map(m=><option key={m}>{m}</option>)}</select>
          </label>
          <label style={{display:"flex",flexDirection:"column",gap:3,fontSize:11,color:"#666",fontWeight:600}}><span>สี</span>
            <select value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))} style={iStyle}>{COLORS.map(c=><option key={c}>{c}</option>)}</select>
          </label>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:"#666",fontWeight:700,marginBottom:6}}>ไซส์และจำนวน</div>
          <div style={{display:"flex",gap:5,marginBottom:6}}>
            <select value={sizeIn.size} onChange={e=>setSizeIn(s=>({...s,size:e.target.value}))} style={{...iStyle,flex:1}}>{SIZES.map(s=><option key={s}>{s}</option>)}</select>
            <input type="number" min="1" placeholder="จำนวน" value={sizeIn.qty} onChange={e=>setSizeIn(s=>({...s,qty:e.target.value}))}
              onKeyDown={e=>{if(e.key==="Enter"&&sizeIn.qty&&parseInt(sizeIn.qty)>0){setForm(f=>({...f,sizes:{...f.sizes,[sizeIn.size]:parseInt(sizeIn.qty)}}));setSizeIn(s=>({...s,qty:""}));}}}
              style={{...iStyle,flex:1}}/>
            <button onClick={()=>{if(!sizeIn.qty||parseInt(sizeIn.qty)<=0)return;setForm(f=>({...f,sizes:{...f.sizes,[sizeIn.size]:parseInt(sizeIn.qty)}}));setSizeIn(s=>({...s,qty:""}));}} style={{padding:"6px 12px",borderRadius:7,border:"none",cursor:"pointer",fontWeight:800,background:"#3b82f6",color:"#fff"}}>+</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4,minHeight:30,background:"#0e0e14",borderRadius:7,padding:6}}>
            {Object.keys(form.sizes).length===0?<span style={{color:"#2a2a34",fontSize:11}}>ยังไม่มีไซส์</span>
              :Object.entries(form.sizes).sort(([a],[b])=>parseFloat(a)-parseFloat(b)).map(([sz,qty])=>(
                <span key={sz} onClick={()=>{const s={...form.sizes};delete s[sz];setForm(f=>({...f,sizes:s}));}} style={{background:"#1e3a5f",color:"#60a5fa",padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:700,cursor:"pointer"}}>{sz}×{qty} ✕</span>
              ))}
          </div>
        </div>
        <label style={{display:"flex",flexDirection:"column",gap:3,fontSize:11,color:"#666",fontWeight:600,marginBottom:12}}>
          <span>หมายเหตุ / SKU</span>
          <input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={iStyle} placeholder="เช่น SP BL39 · SK DC41"/>
        </label>
        <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
          <button onClick={()=>setShowNew(false)} style={{padding:"7px 14px",borderRadius:7,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#666",fontSize:12}}>ยกเลิก</button>
          <button onClick={createOrder} disabled={!Object.keys(form.sizes).length} style={{padding:"7px 16px",borderRadius:7,border:"none",cursor:"pointer",fontWeight:800,fontSize:12,background:Object.keys(form.sizes).length?`linear-gradient(135deg,${ORDER_TYPES[form.type].color},${ORDER_TYPES[form.type].color}cc)`:"#1a1a22",color:Object.keys(form.sizes).length?"#fff":"#333"}}>
            {ORDER_TYPES[form.type].icon} สร้าง
          </button>
        </div>
      </Modal>}

      {/* DETAIL */}
      {selOrder&&<DetailModal order={selOrder} onClose={()=>setSelOrder(null)} onAdvance={doAdvance} onAdvAll={advanceAll} onSetLabel={setLabel} onFinish={finishDirect}/>}

      {/* BANNERS */}
      {!isApiOk()&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:"#001a0a",borderTop:"1px solid #22c55e44",padding:"8px 16px",textAlign:"center",fontSize:11,color:"#22c55e",zIndex:200}}>
        💡 ออฟไลน์ — ข้อมูลเซฟในเครื่อง | ใส่ API_URL เพื่อ sync Google Sheets
      </div>}
    </div>
  );
}

/* ═══════ ORDER CARD ═══════ */
function OCard({order,deptId,onSelect,onAdvAll,onFinish,isDone}) {
  const t=ORDER_TYPES[order.type];
  const dept=DEPARTMENTS.find(d=>d.id===deptId);
  const pairs=deptId!=="done"?getPairsInDept(order,deptId):[];
  const total=pairs.reduce((s,p)=>s+(Number(p.qty)||0),0);
  const over=pairs.some(p=>p.enteredAt&&(Date.now()-Number(p.enteredAt))>ALERT_HRS*3600000);
  const curDepts=getOrderDepts(order);
  return (
    <div onClick={onSelect} style={{background:"#16161c",border:`1px solid ${over?"#ef444455":isDone?"#22c55e28":dept?dept.color+"28":"#1e1e2c"}`,borderRadius:12,padding:12,cursor:"pointer",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:order.type==="F1"?"linear-gradient(90deg,#ef4444,#f97316)":order.type==="L1"?"linear-gradient(90deg,#3b82f6,#60a5fa)":"linear-gradient(90deg,#8b5cf6,#a78bfa)"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginTop:4,marginBottom:7}}>
        <div>
          <span style={{background:t.bg,color:t.color,fontSize:10,fontWeight:800,padding:"1px 6px",borderRadius:99}}>{t.icon}{order.type}</span>
          {over&&<span style={{background:"#ef444420",color:"#ef4444",fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:99,marginLeft:3}}>⚠️</span>}
          <div style={{fontFamily:"monospace",fontSize:11,fontWeight:800,color:t.color,marginTop:2}}>{order.id}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:22,fontWeight:900,color:isDone?"#22c55e":dept?.color,lineHeight:1}}>{isDone?order.totalPairs:total}</div>
          <div style={{fontSize:9,color:"#3a3a4a"}}>คู่</div>
        </div>
      </div>
      {!isDone&&deptId!=="done"&&<div style={{display:"flex",flexWrap:"wrap",gap:2,marginBottom:7}}>
        {pairs.sort((a,b)=>parseFloat(a.size)-parseFloat(b.size)).map(p=>{
          const late=p.enteredAt&&(Date.now()-Number(p.enteredAt))>ALERT_HRS*3600000;
          return <span key={p.id} style={{background:late?"#ef444415":p.label?"#f59e0b10":"#0e0e14",border:`1px solid ${late?"#ef444444":p.label?"#f59e0b44":"#1a1a22"}`,padding:"2px 6px",borderRadius:5,fontSize:10,color:late?"#ef4444":p.label?"#f59e0b":"#aaa"}}>
            {p.model!==order.model||p.color!==order.color?`${p.model}${p.color} `:""}{p.size}{(Number(p.qty)||1)>1&&<span style={{color:"#f59e0b",fontWeight:700}}>×{p.qty}</span>}{p.label&&" 🏷"}{late&&" ⏰"}
          </span>;
        })}
      </div>}
      {/* progress bar */}
      <div style={{display:"flex",gap:1,marginBottom:6}}>
        {DEPT_ORDER.map(dId=>{const cnt=getTotalInDept(order,dId);const d2=DEPARTMENTS.find(d=>d.id===dId);return<div key={dId} style={{flex:Math.max(cnt,0.3),height:3,borderRadius:1,background:dId===deptId?d2.color:cnt>0?d2.color+"60":"#1e1e2c"}}/>;})}
        {(order.pairs||[]).some(p=>p.currentDept==="done")&&<div style={{flex:(order.pairs||[]).filter(p=>p.currentDept==="done").reduce((s,p)=>s+(Number(p.qty)||0),0),height:3,borderRadius:1,background:"#22c55e"}}/>}
      </div>
      {curDepts.length>1&&!isDone&&<div style={{display:"flex",gap:2,flexWrap:"wrap",marginBottom:5}}>
        {curDepts.filter(d=>d!==deptId).map(d=>{const d2=DEPARTMENTS.find(x=>x.id===d);return<span key={d} style={{background:d2.color+"15",color:d2.color,borderRadius:4,padding:"1px 4px",fontSize:9,fontWeight:700}}>+{getTotalInDept(order,d)}@{d2.short}</span>;})}
      </div>}
      {order.note&&<div style={{fontSize:9,color:"#a8860a",background:"#1a1600",borderRadius:4,padding:"2px 6px",marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📋{order.note}</div>}
      {!isDone&&onAdvAll&&deptId!=="done"&&(
        <div style={{display:"flex",flexDirection:"column",gap:4}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",gap:4}}>
            <button onClick={onSelect} style={{flex:1,padding:"4px",borderRadius:6,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#777",fontSize:10}}>🔲 เลือกบางคู่</button>
            <button onClick={onAdvAll} style={{flex:1,padding:"4px",borderRadius:6,border:"none",cursor:"pointer",fontSize:10,fontWeight:800,color:"#fff",background:`linear-gradient(135deg,${dept?.color},${dept?.color}cc)`}}>
              → {deptId==="finish"?"ไปจัดส่ง":deptId==="deliver"?"จบงาน":"ส่งทั้งหมด"} ({total}คู่)
            </button>
          </div>
          {onFinish&&<button onClick={onFinish} style={{width:"100%",padding:"5px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:800,color:"#fff",background:"linear-gradient(135deg,#22c55e,#16a34a)"}}>✅ จบงานเลย ({total}คู่)</button>}
        </div>
      )}
      {isDone&&<div style={{background:"#22c55e16",color:"#22c55e",borderRadius:6,padding:"4px",textAlign:"center",fontSize:10,fontWeight:700}}>✅ เสร็จสิ้น</div>}
    </div>
  );
}

/* ═══════ DETAIL MODAL ═══════ */
function DetailModal({order,onClose,onAdvance,onAdvAll,onSetLabel,onFinish}) {
  const t=ORDER_TYPES[order.type];
  const [sel,setSel]=useState({});
  const selCount=Object.values(sel).reduce((s,q)=>s+q,0);
  const activeByDept=DEPT_ORDER.reduce((acc,d)=>{const p=getPairsInDept(order,d);if(p.length)acc[d]=p;return acc;},{});
  const donePairs=(order.pairs||[]).filter(p=>p.currentDept==="done");

  return <Modal onClose={onClose} title={`📋 ${order.id}`}>
    <div style={{background:t.bg,border:`1px solid ${t.color}40`,borderRadius:9,padding:"8px 12px",display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
      <span style={{fontSize:20}}>{t.icon}</span>
      <div><div style={{fontWeight:900,color:t.color,fontSize:14}}>{order.type} — {t.label}</div><div style={{fontSize:10,color:t.color+"77"}}>{order.note}</div></div>
      <div style={{marginLeft:"auto",textAlign:"right"}}><div style={{fontSize:22,fontWeight:900,color:t.color,lineHeight:1}}>{order.totalPairs}</div><div style={{fontSize:9,color:t.color+"88"}}>คู่รวม</div></div>
    </div>

    {selCount>0&&<div style={{background:"#10b98114",border:"1px solid #10b98140",borderRadius:8,padding:"7px 12px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <span style={{fontSize:12,color:"#10b981",fontWeight:700}}>เลือก {selCount} คู่</span>
      <div style={{display:"flex",gap:5}}>
        <button onClick={()=>setSel({})} style={{padding:"3px 8px",borderRadius:5,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#666",fontSize:11}}>ยกเลิก</button>
        <button onClick={()=>{Object.entries(sel).forEach(([id,q])=>onAdvance(order.id,id,q));setSel({});}} style={{padding:"3px 10px",borderRadius:5,border:"none",cursor:"pointer",fontWeight:800,fontSize:11,background:"#10b981",color:"#fff"}}>→ ส่งต่อ</button>
      </div>
    </div>}

    {Object.entries(activeByDept).map(([deptId,pairs])=>{
      const dept=DEPARTMENTS.find(d=>d.id===deptId);
      const total=pairs.reduce((s,p)=>s+(Number(p.qty)||0),0);
      const nextIdx=DEPT_ORDER.indexOf(deptId);
      const nextDept=nextIdx<DEPT_ORDER.length-1?DEPARTMENTS.find(d=>d.id===DEPT_ORDER[nextIdx+1]):null;
      return <div key={deptId} style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7,borderLeft:`3px solid ${dept.color}`,paddingLeft:8}}>
          <span>{dept.icon}</span><span style={{fontWeight:800,color:dept.color,fontSize:12}}>{dept.name}</span>
          {dept.staff.length>0&&<span style={{fontSize:10,color:"#555"}}>· {dept.staff.join("·")}</span>}
          <span style={{marginLeft:"auto",background:dept.color+"20",color:dept.color,borderRadius:99,padding:"1px 6px",fontSize:10,fontWeight:700}}>{total}คู่</span>
        </div>
        {pairs.sort((a,b)=>parseFloat(a.size)-parseFloat(b.size)).map(p=>{
          const hrs=p.enteredAt?(Date.now()-Number(p.enteredAt))/3600000:0;
          const late=hrs>ALERT_HRS; const isSel=!!sel[p.id]; const sq=sel[p.id]||(Number(p.qty)||1);
          return <div key={p.id} style={{background:isSel?"#10b98110":late?"#ef44440a":"#0e0e14",border:`1px solid ${isSel?"#10b981":late?"#ef444433":p.label?"#f59e0b44":"#1a1a22"}`,borderRadius:8,padding:"9px 10px",marginBottom:5}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <div onClick={()=>{if(isSel){const s={...sel};delete s[p.id];setSel(s);}else setSel(s=>({...s,[p.id]:Number(p.qty)||1}));}} style={{width:18,height:18,borderRadius:4,border:`2px solid ${isSel?"#10b981":"#2a2a38"}`,background:isSel?"#10b981":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff"}}>{isSel?"✓":""}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                  <span style={{fontWeight:800,fontSize:13}}>{p.model}</span>
                  <span style={{fontSize:11,color:"#888"}}>{p.color}</span>
                  <span style={{background:"#1e1e2c",padding:"1px 5px",borderRadius:4,fontSize:11,fontWeight:700}}>ไซส์ {p.size}</span>
                  {late&&<span style={{background:"#ef444420",color:"#ef4444",fontSize:9,padding:"1px 4px",borderRadius:99}}>⚠️{Math.floor(hrs)}ชม.</span>}
                </div>
                <LabelField pairId={p.id} orderId={order.id} label={p.label||""} onSet={onSetLabel}/>
                <div style={{fontSize:9,color:"#555",marginTop:2}}>{p.enteredAt?formatDate(p.enteredAt):"-"}</div>
              </div>
              <div style={{textAlign:"center",minWidth:32}}>
                {isSel&&(Number(p.qty)||1)>1&&<div style={{display:"flex",alignItems:"center",gap:2,marginBottom:2}}>
                  <button onClick={e=>{e.stopPropagation();setSel(s=>({...s,[p.id]:Math.max(1,sq-1)}));}} style={{width:20,height:20,borderRadius:4,border:"1px solid #1e1e2c",cursor:"pointer",background:"#1e1e2c",color:"#aaa",fontSize:13}}>-</button>
                  <span style={{minWidth:20,textAlign:"center",fontSize:12,fontWeight:800}}>{sq}</span>
                  <button onClick={e=>{e.stopPropagation();setSel(s=>({...s,[p.id]:Math.min(Number(p.qty)||1,sq+1)}));}} style={{width:20,height:20,borderRadius:4,border:"1px solid #1e1e2c",cursor:"pointer",background:"#1e1e2c",color:"#aaa",fontSize:13}}>+</button>
                </div>}
                <div style={{fontSize:18,fontWeight:900,color:isSel?"#10b981":dept.color,lineHeight:1}}>{isSel?sq:Number(p.qty)||1}</div>
                <div style={{fontSize:8,color:"#444"}}>คู่</div>
              </div>
            </div>
            {!isSel&&<div style={{marginTop:6}} onClick={e=>e.stopPropagation()}>
              {(deptId==="finish"||deptId==="deliver")&&<button onClick={()=>onFinish(order.id)} style={{width:"100%",padding:"4px",borderRadius:5,border:"none",cursor:"pointer",fontSize:10,fontWeight:800,color:"#fff",background:"linear-gradient(135deg,#22c55e,#16a34a)",marginBottom:4}}>✅ จบงานเลย</button>}
              <button onClick={()=>onAdvance(order.id,p.id,Number(p.qty)||1)} style={{width:"100%",padding:"4px",borderRadius:5,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,color:"#fff",background:`linear-gradient(135deg,${dept.color},${dept.color}cc)`}}>
                → ส่งทั้ง {p.qty} คู่ {nextDept?`ไป${nextDept.short}`:""}
              </button>
            </div>}
          </div>;
        })}
      </div>;
    })}

    {donePairs.length>0&&<div style={{marginBottom:10}}>
      <div style={{borderLeft:"3px solid #22c55e",paddingLeft:8,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontWeight:800,color:"#22c55e",fontSize:12}}>✅ เสร็จสิ้น</span>
        <span style={{marginLeft:"auto",background:"#22c55e20",color:"#22c55e",borderRadius:99,padding:"1px 6px",fontSize:10,fontWeight:700}}>{donePairs.reduce((s,p)=>s+(Number(p.qty)||0),0)}คู่</span>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
        {donePairs.sort((a,b)=>parseFloat(a.size)-parseFloat(b.size)).map(p=><span key={p.id} style={{background:"#22c55e14",color:"#22c55e",padding:"2px 7px",borderRadius:5,fontSize:10}}>{p.model}{p.color}{p.size}{(Number(p.qty)||1)>1&&`×${p.qty}`}</span>)}
      </div>
    </div>}
  </Modal>;
}

/* ═══════ LABEL FIELD ═══════ */
function LabelField({pairId,orderId,label,onSet}) {
  const [editing,setEditing]=useState(false); const [val,setVal]=useState(label);
  const save=()=>{onSet(orderId,pairId,val);setEditing(false);};
  if(editing) return <div style={{display:"flex",gap:3,alignItems:"center",marginTop:3}} onClick={e=>e.stopPropagation()}>
    <input autoFocus value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}} placeholder="SKBL41-F1002-110326" style={{flex:1,padding:"2px 6px",borderRadius:5,border:"1px solid #f59e0b88",background:"#1a1400",color:"#f59e0b",fontSize:10,outline:"none"}}/>
    <button onClick={save} style={{padding:"2px 6px",borderRadius:4,border:"none",cursor:"pointer",background:"#f59e0b",color:"#000",fontSize:10,fontWeight:800}}>✓</button>
    <button onClick={()=>setEditing(false)} style={{padding:"2px 5px",borderRadius:4,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#666",fontSize:10}}>✕</button>
  </div>;
  return <div style={{display:"flex",alignItems:"center",gap:4,marginTop:3}} onClick={e=>e.stopPropagation()}>
    {label?<span style={{background:"#f59e0b14",color:"#f59e0b",borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:700,border:"1px solid #f59e0b44",fontFamily:"monospace"}}>🏷 {label}</span>:<span style={{color:"#2a2a38",fontSize:9}}>ไม่มีรหัส</span>}
    <button onClick={()=>{setVal(label);setEditing(true);}} style={{padding:"1px 5px",borderRadius:3,border:"1px solid #1e1e2c",cursor:"pointer",background:"transparent",color:"#555",fontSize:9}}>{label?"✏️":"+ รหัส"}</button>
  </div>;
}

/* ═══════ MODAL ═══════ */
function Modal({children,onClose,title}) {
  return <div style={{position:"fixed",inset:0,background:"#000000d0",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
    <div style={{background:"#16161c",borderRadius:"14px 14px 0 0",padding:18,width:"100%",maxWidth:560,border:"1px solid #1e1e2c",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h3 style={{margin:0,fontSize:14,fontWeight:800}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:22,lineHeight:1}}>×</button>
      </div>
      {children}
    </div>
  </div>;
}

const iStyle={padding:"7px 8px",borderRadius:7,border:"1px solid #1e1e2c",background:"#0e0e14",color:"#e4e0d8",fontSize:12,outline:"none",width:"100%"};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

  const sw=`const C="khunn-v2";self.addEventListener("install",e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([location.href])).then(()=>self.skipWaiting()))});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))))});self.addEventListener("fetch",e=>{if(e.request.url.includes("script.google.com"))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res;}).catch(()=>caches.match(e.request))))});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
